<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Arial', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">

    <!-- Navigation Bar -->
    <nav class="bg-gray-800 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-semibold">My Portfolio</h1>
            <button id="toggleMenu" class="lg:hidden">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"
                        d="M4 6h16M4 12h16m-7 6h7"></path>
                </svg>
            </button>
            <div id="mobileMenu" class="hidden lg:flex space-x-4">
                <a href="#home" class="hover:text-gray-300">Home</a>
                <a href="#projects" class="hover:text-gray-300">Projects</a>
                <a href="#contact" class="hover:text-gray-300">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Jumbotron Section -->
    <section id="home" class="bg-indigo-900 text-white h-screen flex flex-col justify-center items-center">
        <div class="container mx-auto text-center">
            <h1 class="text-4xl font-semibold mb-4">Welcome to My Portfolio</h1>
            <p class="text-lg mb-8">I am a passionate web developer. Let's create something amazing together!</p>
            <a href="#projects"
                class="bg-yellow-500 text-gray-800 py-2 px-4 rounded hover:bg-yellow-400 transition duration-300">View
                Projects</a>
        </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="bg-gray-200 py-16">
        <div class="container mx-auto">
            <h2 class="text-3xl font-semibold text-center mb-8">My Projects</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Project Card Example -->
                <div class="bg-white rounded shadow p-6">
                    <h3 class="text-xl font-semibold mb-4">Project 1</h3>
                    <p class="text-gray-700 mb-6">Description of Project 1. Lorem ipsum dolor sit amet,
                        consectetur adipiscing elit.</p>
                    <a href="#" class="text-indigo-600 hover:underline">Learn More</a>
                </div>
                <!-- Add more project cards here -->
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="bg-gray-100 py-16">
        <div class="container mx-auto">
            <h2 class="text-3xl font-semibold text-center mb-8">Contact Me</h2>
            <div class="flex justify-center items-center space-x-4">
                <a href="mailto:example@example.com"
                    class="bg-indigo-600 text-white py-2 px-6 rounded hover:bg-indigo-500 transition duration-300">Email</a>
                <a href="tel:123-456-7890"
                    class="bg-indigo-600 text-white py-2 px-6 rounded hover:bg-indigo-500 transition duration-300">Call</a>
            </div>
        </div>
    </section>

    <script>
        // Toggle mobile menu
        const toggleButton = document.getElementById('toggleMenu');
        const mobileMenu = document.getElementById('mobileMenu');

        toggleButton.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    </script>

</body>

</html>
